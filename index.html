<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>湾区行程地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="appbar">
      <a class="brand" href="#bayMap">
        <span class="brand__mark">
          <svg viewBox="0 0 24 24"><path d="M3 16.5 21 4l-5.2 16-4-6.1-5.5 3.5L3 16.5Z"></path></svg>
        </span>
        湾区行程
      </a>
      <div class="trip-fields">
        <label><span>出发</span><input id="origin" value="上海"></label>
        <label><span>日期</span><input id="startDate" type="date" value="2026-07-14"></label>
        <label><span>天数</span><input id="tripDays" type="number" value="8"></label>
      </div>
      <div class="appbar__actions">
        <div class="people-stepper">
          <button id="peopleMinus" type="button" aria-label="减少一人">−</button>
          <label><span>AA</span><input id="partySize" type="number" value="2"></label>
          <button id="peoplePlus" type="button" aria-label="增加一人">+</button>
        </div>
        <button class="icon-button" id="savePlan" title="保存" aria-label="保存">
          <svg viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5V3Z"></path><path d="M8 3v6h8V3"></path><path d="M8 21v-7h8v7"></path></svg>
        </button>
        <button class="primary-button" id="collabButton" type="button">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M19 8v6"></path><path d="M22 11h-6"></path></svg>
          协作
        </button>
      </div>
    </header>

    <main>
      <section class="map-stage">
        <div id="bayMap"></div>
        <div class="map-heading">
          <p>SHANGHAI · JULY 14</p>
          <h1>从大地图开始规划</h1>
        </div>
        <button class="map-reset" id="resetMap" type="button">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 3v6h6"></path></svg>
          湾区全景
        </button>
        <nav class="city-dock" id="cityDock"></nav>
      </section>

      <section class="city-workbench" id="cityWorkbench">
        <div class="city-cover">
          <img src="assets/hero-gba.png" alt="大湾区旅行规划">
          <div><span>GREATER BAY AREA</span><strong>一张地图，展开五座城市</strong></div>
        </div>
        <div class="city-intro">
          <div><p id="cityCode">CAN · GUANGZHOU</p><h2 id="cityTitle">广州</h2></div>
          <div class="city-nav">
            <button class="icon-button light" id="previousCity" aria-label="上一城"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg></button>
            <button class="icon-button light" id="nextCity" aria-label="下一城"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg></button>
          </div>
        </div>

        <div class="city-grid">
          <div class="local-map-wrap">
            <div class="map-mode-switch">
              <button class="is-active" type="button" data-map-mode="places">景点规划</button>
              <button type="button" data-map-mode="transit">公交地铁</button>
            </div>
            <div id="cityMap"></div>
            <div class="poi-legend" id="poiLegend"></div>
          </div>
          <form class="plan-editor" id="planEditor">
            <div class="editor-section">
              <div class="section-label"><span>到达方式</span><strong id="transportLabel">高铁</strong></div>
              <div class="transport-switch" id="transportSwitch"></div>
            </div>
            <div class="input-row">
              <label><span>住宿</span><input data-plan-field="hotel" placeholder="酒店或住宿区域"></label>
              <label><span>预算</span><input data-plan-field="budget" type="number" placeholder="¥"></label>
            </div>
            <label class="editor-field"><span>我的计划</span><textarea data-plan-field="plan" rows="5" placeholder="景点、时间、预约、交通衔接……"></textarea></label>
            <div class="quick-plans" id="quickPlans"></div>
            <div class="day-planner">
              <div class="day-planner__head">
                <span>分日计划表</span>
                <button class="secondary-button" id="addPlanRow" type="button">+ 加一行</button>
              </div>
              <div class="plan-table-wrap">
                <table class="plan-table">
                  <thead><tr><th>日期</th><th>时间</th><th>地标 / 项目</th><th>备注</th><th>定位</th><th></th></tr></thead>
                  <tbody id="planRows"></tbody>
                </table>
              </div>
            </div>
            <div class="input-row">
              <label><span>饮食打卡</span><input data-plan-field="food" placeholder="餐厅、早茶、小吃"></label>
              <label><span>购物打卡</span><input data-plan-field="shop" placeholder="商场、手信、买手店"></label>
            </div>
            <label class="editor-field"><span>备注</span><textarea data-plan-field="notes" rows="3" placeholder="证件、营业时间、雨天备选……"></textarea></label>
            <div class="photo-zone">
              <div><span>旅行记忆</span><strong id="photoCount">0 张</strong></div>
              <button class="secondary-button" id="uploadPhoto" type="button">
                <svg viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M5 21h14"></path></svg>
                上传照片
              </button>
              <input id="photoInput" type="file" accept="image/*" multiple hidden>
            </div>
            <div class="photo-strip" id="photoStrip"></div>
          </form>
        </div>
      </section>

      <section class="route-band">
        <div class="section-heading"><div><p>ROUTE</p><h2>五城路线</h2></div><span>上海飞广州 · 7 月 14 日</span></div>
        <div class="route-line" id="routeLine"></div>
      </section>

      <section class="ledger-band">
        <div class="section-heading">
          <div><p>EXPENSES</p><h2>AA 账本</h2></div>
          <div class="ledger-total"><span>总计</span><strong id="totalExpense">¥0</strong><span id="perPersonExpense">人均 ¥0</span></div>
        </div>
        <div class="expense-toolbar">
          <select id="expenseCity"></select>
          <input id="expenseProject" placeholder="消费项目">
          <input id="expenseAmount" type="number" placeholder="金额">
          <input id="expensePayer" placeholder="付款人">
          <button class="primary-button" id="addExpense" type="button"><svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>记一笔</button>
        </div>
        <div class="expense-list" id="expenseList"></div>
      </section>
    </main>

    <div class="collab-bar" id="collabBar"><span id="collabStatus">本机保存</span><button id="copyInvite" type="button">复制邀请链接</button></div>
    <div class="toast" id="toast"></div>

    <script>
      window.TogetherJSConfig_toolName = "湾区行程协作";
      window.TogetherJSConfig_suppressJoinConfirmation = true;
      window.TogetherJSConfig_disableWebRTC = true;
    </script>
    <script src="https://togetherjs.com/togetherjs-min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
  </body>
</html>
